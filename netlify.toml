[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/config"
  to = "/.netlify/functions/config"
  status = 200

[[redirects]]
  from = "/api/sheets"
  to = "/.netlify/functions/sheets"
  status = 200

[[headers]]
  for = "/api/sheets"
  [headers.values]
    Access-Control-Allow-Origin = "*"
